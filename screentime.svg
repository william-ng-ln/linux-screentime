<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Blue background circle -->
  <circle cx="32" cy="32" r="30" fill="#1565c0"/>
  <!-- Slight inner ring for depth -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#1976d2" stroke-width="2"/>
  <!-- Clock face -->
  <circle cx="32" cy="32" r="22" fill="white"/>
  <!-- Hour markers: 12, 3, 6, 9 -->
  <line x1="32" y1="12" x2="32" y2="17" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="52" y1="32" x2="47" y2="32" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="52" x2="32" y2="47" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="12" y1="32" x2="17" y2="32" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minor ticks at 1, 2, 4, 5, 7, 8, 10, 11 -->
  <line x1="42.7" y1="13.5" x2="41.2" y2="16.1" stroke="#90caf9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50.5" y1="21.3" x2="47.9" y2="22.8" stroke="#90caf9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50.5" y1="42.7" x2="47.9" y2="41.2" stroke="#90caf9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42.7" y1="50.5" x2="41.2" y2="47.9" stroke="#90caf9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21.3" y1="50.5" x2="22.8" y2="47.9" stroke="#90caf9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13.5" y1="42.7" x2="16.1" y2="41.2" stroke="#90caf9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13.5" y1="21.3" x2="16.1" y2="22.8" stroke="#90caf9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21.3" y1="13.5" x2="22.8" y2="16.1" stroke="#90caf9" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hour hand pointing ~10 -->
  <line x1="32" y1="32" x2="22" y2="20" stroke="#1565c0" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Minute hand pointing ~2 -->
  <line x1="32" y1="32" x2="43" y2="19" stroke="#0d47a1" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3.5" fill="#0d47a1"/>
  <circle cx="32" cy="32" r="1.8" fill="white"/>
</svg>
